name: Backup Script Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y borgbackup rsync inotify-tools mailutils
      - name: Make script executable
        run: chmod +x enhanced_automated_backups.sh
      - name: Syntax check
        run: bash -n enhanced_automated_backups.sh
      - name: Test mode validation (dry run)
        run: |
          # Simulate a minimal config for syntax check
          export BORG_PASSPHRASE=test
          export BORG_REPO=$(mktemp -d)
          bash enhanced_automated_backups.sh list 2>/dev/null || true
          echo "✅ Basic Validation Passed"
      - name: Check example config exists
        run: test -f config/ukwinika-backup.conf.example
